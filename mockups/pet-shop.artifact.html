  background:url('data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22240%22%20height%3D%22240%22%20viewBox%3D%220%200%20240%20240%22%3E%3Cg%20fill%3D%22%23ffffff%22%20opacity%3D%220.038%22%3E%3Cpath%20d%3D%22M30%2046%20Q52%2026%2084%2046%20Q52%2066%2030%2046%20Z%22/%3E%3Cpath%20d%3D%22M84%2046%20L104%2033%20L100%2046%20L104%2059%20Z%22/%3E%3Cg%20transform%3D%22translate%28150%2C150%29%20rotate%2820%29%22%3E%3Cellipse%20cx%3D%220%22%20cy%3D%220%22%20rx%3D%2226%22%20ry%3D%2216%22/%3E%3Ccircle%20cx%3D%22-18%22%20cy%3D%22-10%22%20r%3D%229%22/%3E%3Cpath%20d%3D%22M24%202%20q22%204%2030%2020%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%223%22%20fill%3D%22none%22/%3E%3C/g%3E%3Cg%20transform%3D%22translate%28180%2C40%29%20rotate%28-12%29%22%20fill%3D%22%23ffffff%22%3E%3Ccircle%20cx%3D%220%22%20cy%3D%226%22%20r%3D%227%22/%3E%3Ccircle%20cx%3D%22-9%22%20cy%3D%22-4%22%20r%3D%223.2%22/%3E%3Ccircle%20cx%3D%22-3%22%20cy%3D%22-9%22%20r%3D%223.2%22/%3E%3Ccircle%20cx%3D%224%22%20cy%3D%22-9%22%20r%3D%223.2%22/%3E%3Ccircle%20cx%3D%2210%22%20cy%3D%22-4%22%20r%3D%223.2%22/%3E%3C/g%3E%3Cpath%20d%3D%22M30%20170%20Q52%20150%2084%20170%20Q52%20190%2030%20170%20Z%22/%3E%3Cpath%20d%3D%22M84%20170%20L104%20157%20L100%20170%20L104%20183%20Z%22/%3E%3C/g%3E%3C/svg%3E') 0 0/240px 240px, radial-gradient(130% 90% at 50% 30%,#484b60,#3a3d4e 70%,#33364550)}
.shop::after{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 200px rgba(15,12,25,.55)}
.shop>*{position:relative;z-index:1}
.mk{font-family:var(--marker)} .cc{width:1em;height:1em;flex:none;vertical-align:-.16em}

/* floating HUD */
.hud-left{position:absolute;top:20px;left:22px;display:flex;align-items:center;gap:12px;z-index:5}
.paw{width:56px;height:56px;background:var(--yellow);border:3px solid var(--ink);border-radius:15px;box-shadow:3px 4px 0 var(--ink);cursor:pointer;display:grid;place-items:center}
.paw svg{width:32px;height:32px}
.coinpill{display:inline-flex;align-items:center;gap:8px;background:var(--paper);border:3px solid var(--ink);border-radius:50px;padding:5px 20px 5px 7px;box-shadow:3px 4px 0 var(--ink)}
.coinpill .cc{width:34px;height:34px}
.coinpill .n{font-family:var(--marker);font-size:24px;color:var(--tx);line-height:1}

/* calendar tab peeking top-right */
.cal-tab{position:absolute;top:-6px;right:40px;z-index:5;transform:rotate(-3deg);background:var(--paper);
  border:3px solid var(--ink);border-radius:0 0 12px 12px;padding:20px 22px 12px;box-shadow:3px 5px 0 rgba(0,0,0,.3);
  background-image:repeating-linear-gradient(0deg,transparent 0 21px,rgba(120,140,200,.16) 21px 22px),repeating-linear-gradient(90deg,transparent 0 21px,rgba(120,140,200,.16) 21px 22px)}
.cal-tab .rings{position:absolute;top:-9px;left:14px;right:14px;display:flex;justify-content:space-between}
.cal-tab .rings i{width:11px;height:17px;background:#cfd3dd;border:2.5px solid var(--ink);border-radius:50%}
.cal-tab .row{display:flex;align-items:flex-end;gap:9px}
.cal-tab .rd{font-family:var(--body);font-weight:800;font-size:10px;color:var(--mut);text-align:center;line-height:1}
.cal-tab .rd b{font-family:var(--marker);font-size:30px;color:var(--tx);display:block}
.cal-tab .city{font-family:var(--marker);font-size:30px;color:#a9743e}

/* ===== MAIN COLUMNS ===== */
.cols{display:flex;align-items:center;justify-content:center;gap:clamp(22px,3.4vw,60px);padding:40px 30px;flex-wrap:wrap}
.card-ink{border:3px solid var(--ink);box-shadow:4px 5px 0 var(--ink)}

/* LEFT — pet shop */
.ps{position:relative;width:352px}
.ps-peri{position:relative;background:var(--peri);border:3px solid var(--ink);border-radius:22px;padding:96px 22px 26px;box-shadow:5px 6px 0 var(--ink)}
.ps-title{position:absolute;top:-26px;left:14px;right:14px;background:var(--paper);border:3px solid var(--ink);border-radius:16px;
  box-shadow:3px 4px 0 var(--ink);text-align:center;padding:14px 8px 10px}
.ps-title span{font-family:var(--marker);font-size:52px;color:var(--tx);line-height:.9;letter-spacing:.01em}
.ps-sub{font-family:var(--body);font-weight:800;font-size:17px;color:#2b2d3a;line-height:1.25;letter-spacing:.01em}
.round-tab{display:inline-flex;align-items:center;gap:8px;margin-top:16px}
.round-tab .hash{font-family:var(--marker);font-size:26px;color:var(--paper);text-shadow:1.5px 1.5px 0 var(--ink)}
.round-tab .pill{background:var(--blue);color:var(--paper);border:2.5px solid var(--ink);border-radius:50px;padding:5px 15px;
  font-family:var(--body);font-weight:900;font-size:13px;letter-spacing:.03em;box-shadow:0 3px 0 var(--blue-lo)}
.reach{position:relative;margin:-8px 12px 0;background:var(--paper);border:3px solid var(--ink);border-radius:18px;
  box-shadow:4px 5px 0 var(--ink);text-align:center;padding:12px 16px 16px}
.reach .rl{font-family:var(--body);font-weight:900;font-size:13px;letter-spacing:.06em;color:var(--mut);text-transform:uppercase}
.reach .rn{font-family:var(--marker);font-size:52px;color:var(--tx);line-height:.95;margin:2px 0 8px}
.start-btn{width:100%;cursor:pointer;background:var(--green);color:var(--tx);border:3px solid var(--ink);border-radius:14px;
  font-family:var(--marker);font-size:34px;padding:8px;box-shadow:0 5px 0 var(--green-lo);letter-spacing:.02em}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--green-lo)}
.start-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--green-lo)}

/* MIDDLE — inventory device */
.inv{display:flex;flex-direction:column;align-items:center;gap:16px}
.inv-dev{position:relative;background:var(--panel);border:3px solid var(--ink);border-radius:20px;padding:34px 20px 22px;box-shadow:5px 6px 0 var(--ink)}
.inv-title{position:absolute;top:-20px;left:50%;transform:translateX(-50%);background:var(--paper);border:3px solid var(--ink);border-radius:12px;
  box-shadow:2px 3px 0 var(--ink);padding:7px 24px;font-family:var(--marker);font-size:22px;letter-spacing:.05em;white-space:nowrap}
.inv-screen{background:var(--screen);border:2.5px solid var(--ink);border-radius:14px;padding:12px;box-shadow:inset 0 3px 8px rgba(0,0,0,.2)}
.inv-grid{display:grid;grid-template-columns:repeat(4,64px);grid-template-rows:repeat(2,64px);gap:10px}
.inv-slot{background:var(--slot);border:2px solid var(--slot-ed);border-radius:12px;box-shadow:inset 0 2px 4px rgba(0,0,0,.08);position:relative}
.inv-slot.wand{grid-row:span 2;display:grid;place-items:center}
.inv-slot svg{width:74%;height:74%;display:block;margin:auto;position:absolute;inset:0}
.inv-slot.wand svg{width:56%;height:86%;position:static}
.sell-btn{display:inline-flex;align-items:center;gap:9px;cursor:pointer;background:var(--red);border:3px solid var(--ink);border-radius:50px;
  padding:8px 12px 8px 20px;box-shadow:0 4px 0 var(--red-lo)}
.sell-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--red-lo)}
.sell-btn .t{font-family:var(--marker);font-size:24px;color:var(--paper);text-shadow:1px 1px 0 var(--red-lo)}
.sell-btn .n{font-family:var(--marker);font-size:24px;color:var(--paper)}
.sell-btn .cc{width:30px;height:30px}

/* RIGHT — shopping list notepad */
.note{position:relative;width:420px}
.note-peri{position:absolute;inset:14px -6px -10px 6px;background:var(--peri);border:3px solid var(--ink);border-radius:14px;box-shadow:4px 5px 0 var(--ink)}
.note-pad{position:relative;background:var(--paper);border:3px solid var(--ink);border-radius:12px;padding:30px 20px 20px;box-shadow:3px 4px 0 rgba(0,0,0,.25);
  background-image:repeating-linear-gradient(0deg,transparent 0 21px,rgba(120,140,200,.15) 21px 22px),repeating-linear-gradient(90deg,transparent 0 21px,rgba(120,140,200,.15) 21px 22px)}
.note-rings{position:absolute;top:-11px;left:16px;right:16px;display:flex;justify-content:space-between}
.note-rings i{width:13px;height:20px;background:#cfd3dd;border:2.5px solid var(--ink);border-radius:50%}
.note-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.note-hd .t{font-family:var(--marker);font-size:30px;color:var(--tx);white-space:nowrap}
.reroll{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:var(--blue);border:2.5px solid var(--ink);border-radius:50px;padding:5px 9px 5px 14px;box-shadow:0 3px 0 var(--blue-lo)}
.reroll .t{font-family:var(--body);font-weight:900;font-size:12px;color:var(--paper);letter-spacing:.03em}
.reroll .n{font-family:var(--marker);font-size:18px;color:var(--paper)} .reroll .cc{width:26px;height:26px}
.buy-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:end;margin-top:4px}
.buy{display:flex;flex-direction:column;align-items:center;gap:10px}
.foot{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:min-content min-content;gap:0}
.fp{position:relative;height:44px;display:grid;place-items:center}
.fp-grid{display:grid;gap:3px}
.fp-grid .c{width:24px;height:24px;background:#c9cdd6;border:2px solid #a7abb6;border-radius:6px}
.fp-grid .c.on{background:#8ed94f;border-color:#20222e;display:grid;place-items:center}
.fp-grid .c.on svg{width:19px;height:14px}
.price{display:inline-flex;align-items:center;gap:5px;background:var(--gold);border:2.5px solid var(--ink);border-radius:9px;padding:3px 12px 3px 5px;box-shadow:0 3px 0 var(--gold-lo)}
.price .cc{width:26px;height:26px} .price .n{font-family:var(--marker);font-size:24px;color:var(--tx)}
.note-flavor{text-align:center;font-family:var(--hand);font-size:15px;color:var(--mut);margin-top:16px}

@media (max-width:980px){.cols{flex-direction:column;gap:26px} .cal-tab{display:none}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
